<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="auth">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" id="loginUsername" placeholder="Username" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="#" id="showRegister">Register</a></p>
  </div>

  <div id="register" style="display: none;">
    <h2>Register</h2>
    <form id="registerForm">
      <input type="text" id="registerUsername" placeholder="Username" required>
      <input type="password" id="registerPassword" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="#" id="showLogin">Login</a></p>
  </div>

  <div id="chat" style="display: none;">
    <div class="chat-topnav">
      <button id="publicChatBtn" class="tab-button active">Public</button>
      <button id="profileTabBtn" class="tab-button">Profile</button>
    </div>

    <div class="top-panels">
      <div class="top-section">
        <div class="top-section-header"><span>Direct Messages</span></div>
        <div id="usersList" class="top-list"></div>
      </div>
      <div class="top-section">
        <div class="top-section-header"><span>Groups</span></div>
        <div id="groupsList" class="top-list"></div>
        <form id="createGroupForm" class="create-group-form">
          <input type="text" id="groupNameInput" placeholder="New group name" required>
          <button type="submit">Create</button>
        </form>
        <div id="groupControls" class="group-controls" style="display:none; margin-top: 12px;">
          <div class="top-section-header"><span>Group Members</span></div>
          <div id="groupMembersList" class="top-list"></div>
          <form id="addGroupMemberForm" class="create-group-form">
            <select id="groupMemberSelect">
              <option value="">Select user to add</option>
            </select>
            <button type="submit">Add</button>
          </form>
        </div>
      </div>
    </div>

    <div id="contentPanels">
      <section id="chatPanel" class="main-chat">
        <div id="chatHeader" class="chat-header">Public Chat</div>
        <div id="messages" class="messages"></div>
        <form id="messageForm" class="message-form">
          <input type="text" id="messageInput" placeholder="Type a message..." required>
          <button type="submit" id="sendMessageBtn">Send</button>
        </form>
      </section>

      <section id="profilePanel" class="profile-panel" style="display: none;">
        <h3>My Profile</h3>
        <div class="profile-card">
          <div><strong>Username:</strong> <span id="profileUsername"></span></div>
          <div><strong>Role:</strong> <span id="profileRole"></span></div>
        </div>

        <form id="changePasswordForm" class="profile-form">
          <h4>Change Password</h4>
          <input type="password" id="currentPassword" placeholder="Current password" required>
          <input type="password" id="newPassword" placeholder="New password" required>
          <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
          <button type="submit">Update Password</button>
        </form>

        <div class="sidebar-section profile-friends-section">
          <h4>Friends</h4>
          <div id="friendsList" class="sidebar-list"></div>
        </div>
      </section>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
